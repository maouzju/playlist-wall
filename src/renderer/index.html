<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: http:; media-src https: http: blob: data:; connect-src https: http:;"
  >
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歌单墙</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="loading">
    <div class="loading-title">歌单墙</div>
    <div class="loading-copy">正在把你的全部歌单摊平成一整面歌墙</div>
    <div class="loading-stage" id="loading-stage">正在初始化...</div>
    <div class="progress-shell">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
  </div>

  <div id="auth-screen" class="hidden">
    <div class="auth-card">
      <div class="auth-title">登录网易云音乐</div>
      <div class="auth-copy">歌单墙不再读取本机客户端私有数据，直接用手机扫码就可以进入。</div>
      <div class="auth-qr-shell">
        <img id="auth-qr-image" alt="登录二维码">
      </div>
      <div class="auth-stage" id="auth-stage">正在生成登录二维码...</div>
      <div class="auth-actions">
        <button class="auth-btn" id="auth-refresh-btn" type="button">刷新二维码</button>
      </div>
      <div class="auth-note">登录状态和缓存只会保存在当前电脑的本地应用目录。</div>
    </div>
  </div>

  <div id="app" class="hidden">
    <header id="topbar">
      <div class="top-controls">
        <div id="tab-strip" role="tablist" aria-label="歌单分区">
          <button class="tab-btn tab-btn--icon is-active" id="tab-owned" type="button" role="tab" aria-selected="true" aria-label="自己创建">
            <span class="tab-btn__content">
              <svg class="icon-stroke tab-btn__icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="8" r="3"></circle>
                <path d="M5.5 18.5c1.8-3 11.2-3 13 0"></path>
              </svg>
              <span class="tab-btn__count" id="tab-owned-count">0</span>
            </span>
          </button>
          <button class="tab-btn tab-btn--icon" id="tab-subscribed" type="button" role="tab" aria-selected="false" aria-label="收藏订阅">
            <span class="tab-btn__content">
              <svg class="icon-stroke tab-btn__icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 4.75h10a1 1 0 0 1 1 1V19l-6-3-6 3V5.75a1 1 0 0 1 1-1Z"></path>
              </svg>
              <span class="tab-btn__count" id="tab-subscribed-count">0</span>
            </span>
          </button>
          <button class="tab-btn tab-btn--icon" id="tab-explore" type="button" role="tab" aria-selected="false" aria-label="探索歌单">
            <span class="tab-btn__content">
              <svg class="icon-stroke tab-btn__icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="6"></circle>
                <path d="M16 16l4 4"></path>
                <path d="M11 8.5v5"></path>
                <path d="M8.5 11h5"></path>
              </svg>
              <span class="tab-btn__count" id="tab-explore-count">0</span>
            </span>
          </button>
          <button class="tab-btn tab-btn--icon" id="tab-artists" type="button" role="tab" aria-selected="false" aria-label="鑹轰汉姝屽崟">
            <span class="tab-btn__content">
              <svg class="icon-stroke tab-btn__icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 4v11"></path>
                <path d="M12 8c2.9-1.8 5.6-2.5 8-2v8c-2.4-.5-5.1.2-8 2"></path>
                <path d="M12 8c-2.9-1.8-5.6-2.5-8-2v8c2.4-.5 5.1.2 8 2"></path>
                <circle cx="12" cy="18" r="1.75"></circle>
              </svg>
              <span class="tab-btn__count" id="tab-artists-count">0</span>
            </span>
          </button>
        </div>

        <label class="search-shell" for="search-input">
          <input id="search-input" type="text" placeholder="搜索歌单、歌曲、专辑、歌手">
        </label>
      </div>

      <div class="top-actions">
        <button class="top-action-btn top-action-btn--icon" id="locate-current-btn" type="button" aria-label="定位当前播放" title="定位当前播放">
          <svg class="icon-stroke" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <circle cx="12" cy="12" r="8"></circle>
            <path d="M12 2.5v3"></path>
            <path d="M12 18.5v3"></path>
            <path d="M2.5 12h3"></path>
            <path d="M18.5 12h3"></path>
          </svg>
        </button>
        <button class="top-action-btn top-action-btn--icon" id="settings-btn" type="button" aria-label="设置" title="设置">
          <svg class="icon-stroke" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7h8"></path>
            <path d="M16 7h4"></path>
            <path d="M4 17h4"></path>
            <path d="M12 17h8"></path>
            <circle cx="14" cy="7" r="2"></circle>
            <circle cx="10" cy="17" r="2"></circle>
          </svg>
        </button>
        <button class="top-action-btn top-action-btn--icon" id="theme-toggle-btn" type="button" aria-label="切换黑白" title="切换黑白">
          <svg class="icon-stroke" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 17.5h6"></path>
            <path d="M9.8 20.5h4.4"></path>
            <path d="M10 14.9c-2.3-1-3.8-3.2-3.8-5.8a5.8 5.8 0 1 1 11.6 0c0 2.6-1.5 4.8-3.8 5.8"></path>
          </svg>
        </button>
      </div>
    </header>

    <main id="content">
      <section id="wall-view">
        <div id="explore-loading-indicator" class="explore-loading-indicator hidden" role="status" aria-live="polite" aria-atomic="true">
          <span class="explore-loading-indicator__spinner" aria-hidden="true"></span>
          <span class="explore-loading-indicator__text" id="explore-loading-text">正在加载探索歌单...</span>
        </div>
        <div id="wall-scroll">
          <div id="wall-columns"></div>
          <div id="wall-empty" class="hidden">
            <div class="empty-title">当前没有可显示的歌单</div>
            <div class="empty-copy">换个关键词，或者切换到另一个 tab。</div>
          </div>
        </div>
      </section>
    </main>

    <footer id="player-bar">
      <div class="player-track">
        <div class="player-cover hidden" id="player-cover">
          <img id="player-cover-image" alt="">
        </div>
        <div class="player-track-copy">
        <div class="player-kicker">正在播放</div>
        <div class="player-title" id="player-title">还没开始播放</div>
        <div class="player-meta" id="player-meta">点任意一首开始</div>
        </div>
      </div>

      <div class="player-center">
        <div class="player-buttons">
          <button class="player-btn player-btn--icon" id="shuffle-btn" type="button" aria-label="随机 关" title="随机 关" data-active="false">
            <svg class="icon-stroke player-btn__icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7h3c1.15 0 2.24.53 2.95 1.43L14 13.5"></path>
              <path d="M14 13.5 17.05 16.57A3.75 3.75 0 0 0 20 18h1"></path>
              <path d="m18 5 3 2-3 2"></path>
              <path d="M4 17h3c1.15 0 2.24-.53 2.95-1.43L14 10.5"></path>
              <path d="M14 10.5 17.05 7.43A3.75 3.75 0 0 1 20 6h1"></path>
              <path d="m18 16 3 2-3 2"></path>
            </svg>
          </button>
          <button class="player-btn player-btn--icon" id="prev-btn" type="button" aria-label="上一首" title="上一首">
            <svg class="icon-fill player-btn__icon" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="5" y="5" width="2.5" height="14" rx="1.25"></rect>
              <path d="M18.5 6v12l-9-6 9-6Z"></path>
            </svg>
          </button>
          <button class="player-btn player-btn--primary player-btn--icon player-btn--play" id="play-btn" type="button" aria-label="播放" title="播放" data-state="paused">
            <svg class="icon-fill player-btn__icon player-btn__icon--play" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 6.5v11l9-5.5-9-5.5Z"></path>
            </svg>
            <svg class="icon-fill player-btn__icon player-btn__icon--pause" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="7.25" y="6.5" width="3.5" height="11" rx="1.2"></rect>
              <rect x="13.25" y="6.5" width="3.5" height="11" rx="1.2"></rect>
            </svg>
          </button>
          <button class="player-btn player-btn--icon" id="next-btn" type="button" aria-label="下一首" title="下一首">
            <svg class="icon-fill player-btn__icon" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="16.5" y="5" width="2.5" height="14" rx="1.25"></rect>
              <path d="M5.5 6v12l9-6-9-6Z"></path>
            </svg>
          </button>
          <button class="player-btn player-btn--icon" id="repeat-btn" type="button" aria-label="循环 全部" title="循环 全部" data-mode="all">
            <svg class="icon-stroke player-btn__icon player-btn__icon--repeat-all" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M17 2l4 4-4 4"></path>
              <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
              <path d="M7 22l-4-4 4-4"></path>
              <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
            </svg>
            <svg class="icon-stroke player-btn__icon player-btn__icon--repeat-one" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M17 2l4 4-4 4"></path>
              <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
              <path d="M7 22l-4-4 4-4"></path>
              <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
              <text x="12" y="14.5" text-anchor="middle" font-size="7" font-weight="700" fill="currentColor" stroke="none">1</text>
            </svg>
            <svg class="icon-stroke player-btn__icon player-btn__icon--repeat-off" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M17 2l4 4-4 4"></path>
              <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
              <path d="M7 22l-4-4 4-4"></path>
              <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
              <path d="M6 6 18 18"></path>
            </svg>
          </button>
        </div>

        <div class="player-progress">
          <span id="player-time-current">0:00</span>
          <input id="progress-range" type="range" min="0" max="1000" value="0">
          <span id="player-time-total">0:00</span>
        </div>
      </div>

      <div class="player-volume">
        <label class="player-volume__label" for="volume-range" aria-label="音量" title="音量">
          <svg class="icon-stroke" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4.5 10h3.5l4-4v12l-4-4H4.5z"></path>
            <path d="M15 9c1.25.95 1.85 1.94 1.85 3S16.25 14.05 15 15"></path>
            <path d="M17.75 6.75c1.8 1.5 2.75 3.24 2.75 5.25s-.95 3.75-2.75 5.25"></path>
          </svg>
        </label>
        <input id="volume-range" type="range" min="0" max="100" value="78">
      </div>
    </footer>
  </div>

  <div id="settings-backdrop" class="hidden"></div>
  <aside id="settings-panel" aria-label="设置">
    <div class="settings-header">
      <div class="settings-title">界面设置</div>
      <button class="settings-close-btn" id="settings-close-btn" type="button">关闭</button>
    </div>
    <label class="settings-row" for="ui-scale-range">
      <div class="settings-copy">
        <div class="settings-label">&#x754C;&#x9762;&#x7F29;&#x653E;</div>
        <div class="settings-hint">&#x6539;&#x53D8;&#x6574;&#x4F53;&#x5BC6;&#x5EA6;&#xFF0C;&#x6B4C;&#x5355;&#x5217;&#x6570;&#x4F1A;&#x968F;&#x4E4B;&#x81EA;&#x9002;&#x5E94;&#x53D8;&#x5316;&#x3002;</div>
      </div>
      <div class="settings-scale-control">
        <output class="settings-scale-value" id="ui-scale-value" for="ui-scale-range">100%</output>
        <input id="ui-scale-range" type="range" min="80" max="125" step="5" value="100">
      </div>
    </label>
    <label class="settings-row" for="playlist-recommendations-toggle">
      <div class="settings-copy">
        <div class="settings-label">歌单推荐音乐</div>
        <div class="settings-hint">打开后，每张歌单底部会补一组网易云推荐曲目。</div>
      </div>
      <input id="playlist-recommendations-toggle" type="checkbox">
    </label>
    <label class="settings-row" for="liked-playlist-display-mode-select">
      <div class="settings-copy">
        <div class="settings-label">&#x7231;&#x5FC3;&#x6B4C;&#x5355;&#x5982;&#x4F55;&#x5C55;&#x73B0;</div>
        <div class="settings-hint">&#x5B8C;&#x6574;&#x663E;&#x793A;&#x6216;&#x53EA;&#x4FDD;&#x7559;&#x8FD8;&#x6CA1;&#x88AB;&#x5176;&#x4ED6;&#x81EA;&#x5EFA;&#x6B4C;&#x5355;&#x6536;&#x5F55;&#x7684;&#x66F2;&#x76EE;&#x3002;</div>
      </div>
      <select id="liked-playlist-display-mode-select" class="settings-select">
        <option value="all">&#x5B8C;&#x6574;&#x663E;&#x793A;</option>
        <option value="uncollected">&#x4EC5;&#x663E;&#x793A;&#x672A;&#x88AB;&#x6B4C;&#x5355;&#x6536;&#x5F55;&#x7684;</option>
        <option value="hidden">&#x9690;&#x85CF;</option>
      </select>
    </label>
    <label class="settings-row" for="artist-track-display-limit-input">
      <div class="settings-copy">
        <div class="settings-label">&#x827A;&#x4EBA;&#x6700;&#x591A;&#x663E;&#x793A;&#x66F2;&#x6570;</div>
        <div class="settings-hint">&#x827A;&#x4EBA;&#x6B4C;&#x5355;&#x4F1A;&#x6309;&#x70ED;&#x5EA6;&#x964D;&#x5E8F;&#x8865;&#x5168;&#x66F2;&#x76EE;&#xFF0C;&#x8FD9;&#x4E2A;&#x4E0A;&#x9650;&#x7528;&#x6765;&#x63A7;&#x5236;&#x6BCF;&#x4E2A;&#x827A;&#x4EBA;&#x5361;&#x7247;&#x6700;&#x591A;&#x5C55;&#x793A;&#x591A;&#x5C11;&#x9996;&#x3002;</div>
      </div>
      <input id="artist-track-display-limit-input" class="settings-number-input" type="number" min="20" max="1000" step="10" value="100">
    </label>
    <div class="settings-row settings-row--actions">
      <div class="settings-copy">
        <div class="settings-label">账号</div>
        <div class="settings-hint">清空本机登录状态和歌单缓存，可以切换到其他账号。</div>
      </div>
      <button class="settings-action-btn" id="settings-logout-btn" type="button">退出登录</button>
    </div>
  </aside>

  <div id="context-menu" class="hidden">
    <button class="context-menu-item" id="context-remove-track-btn" type="button">移出歌单</button>
  </div>

  <div id="album-hover-preview" class="hidden" aria-hidden="true">
    <img id="album-hover-preview-image" alt="">
  </div>

  <div id="playlist-undo-layer" aria-live="polite"></div>
  <div id="toast-wrap"></div>
  <audio id="audio" preload="none"></audio>
  <script src="app.js"></script>
</body>
</html>
