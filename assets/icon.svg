<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Alt D: 音符砖墙 — brick wall pattern with large music note -->
  <rect width="512" height="512" rx="80" ry="80" fill="#111111"/>

  <!-- Brick wall rows -->
  <g fill="none" stroke="#333333" stroke-width="2">
    <!-- Horizontal lines -->
    <line x1="52" y1="110" x2="460" y2="110"/>
    <line x1="52" y1="168" x2="460" y2="168"/>
    <line x1="52" y1="226" x2="460" y2="226"/>
    <line x1="52" y1="284" x2="460" y2="284"/>
    <line x1="52" y1="342" x2="460" y2="342"/>
    <line x1="52" y1="400" x2="460" y2="400"/>
    <!-- Vertical offsets (brick pattern) -->
    <line x1="160" y1="52"  x2="160" y2="110"/>
    <line x1="310" y1="52"  x2="310" y2="110"/>
    <line x1="100" y1="110" x2="100" y2="168"/>
    <line x1="256" y1="110" x2="256" y2="168"/>
    <line x1="400" y1="110" x2="400" y2="168"/>
    <line x1="160" y1="168" x2="160" y2="226"/>
    <line x1="310" y1="168" x2="310" y2="226"/>
    <line x1="100" y1="226" x2="100" y2="284"/>
    <line x1="256" y1="226" x2="256" y2="284"/>
    <line x1="400" y1="226" x2="400" y2="284"/>
    <line x1="160" y1="284" x2="160" y2="342"/>
    <line x1="310" y1="284" x2="310" y2="342"/>
    <line x1="100" y1="342" x2="100" y2="400"/>
    <line x1="256" y1="342" x2="256" y2="400"/>
    <line x1="400" y1="342" x2="400" y2="400"/>
    <line x1="160" y1="400" x2="160" y2="460"/>
    <line x1="310" y1="400" x2="310" y2="460"/>
  </g>

  <!-- Large centered double note -->
  <g transform="translate(168, 130)" fill="#f4f4f4">
    <circle cx="0" cy="220" r="40"/>
    <circle cx="120" cy="196" r="40"/>
    <rect x="34" y="0" width="12" height="224" rx="4"/>
    <rect x="154" y="-24" width="12" height="224" rx="4"/>
    <path d="M42,4 Q98,-40 162,-20" stroke="#f4f4f4" stroke-width="14" fill="none" stroke-linecap="round"/>
  </g>
</svg>
